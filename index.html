<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src https://api.github.com; img-src data:" />
    <title>PR Test Diff Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%2358a6ff'><path d='M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Z'/></svg>" />

    <!-- diff2html + jsdiff (with SRI) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/css/diff2html.min.css"
          integrity="sha384-iBvSlI3tNrrSIy7s6mvLg+5B2Z/QXbR4L0Pzg1nRf8zkXrz5JF316MLm2igMIpi2"
          crossorigin="anonymous" />
    <script defer
            src="https://cdn.jsdelivr.net/npm/diff2html@3.4.48/bundles/js/diff2html.min.js"
            integrity="sha384-1tVmtFdzvhqVP3vQWJmKYvD0uTtR0r+FhlLWw+vG6F/vNDS7yegNMNNHRS12fSyR"
            crossorigin="anonymous"></script>
    <script defer
            src="https://cdn.jsdelivr.net/npm/diff@5.2.0/dist/diff.min.js"
            integrity="sha384-lJJVaUgxmk/PVfQnAsGN1QuJZrE+n6bg2EMu33yVZOJ2av/3UzTHbmnPCI7ENJYa"
            crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
  </head>
  <body>

    <!-- Toolbar -->
    <div id="toolbar">
      <label for="pr-url">PR:</label>
      <input id="pr-url" type="text" placeholder="PR # or URL  (e.g. 2023 or https://github.com/owner/repo/pull/123)" spellcheck="false">
      <button id="btn-load">Load</button>
      <label for="gh-token">Token:</label>
      <input id="gh-token" type="password" placeholder="read-only PAT (optional)" title="Only public_repo or fine-grained read-only scope is needed">
      <label for="commit-select">Commit:</label>
      <select id="commit-select" disabled>
        <option value="ALL">ALL</option>
      </select>
      <label for="view-select">View:</label>
      <select id="view-select">
        <option value="side-by-side">Side by Side</option>
        <option value="collapsed">Collapsed</option>
      </select>
      <span id="pr-title"></span>
      <span id="status-msg"></span>
    </div>

    <!-- Main area -->
    <div id="main">
      <div id="sidebar">
        <div id="sidebar-header">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="flex-shrink:0;opacity:0.7"><path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5a.25.25 0 0 1-.2-.1l-.9-1.2C6.07 1.26 5.55 1 5 1H1.75Z"/></svg>
          Files
          <span id="file-count-badge">0</span>
        </div>
        <div id="file-list"></div>
      </div>
      <div id="splitter"></div>
      <div id="diff-pane">
        <div id="diff-empty">
          <svg width="24" height="24" viewBox="0 0 16 16" fill="currentColor" style="opacity:0.4"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/></svg>
          Enter a PR URL and click Load
          <span class="hint">Tip: Select text in the diff and right-click to track values across changes</span>
        </div>
      </div>
    </div>

  </body>
</html>
